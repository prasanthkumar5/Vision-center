<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <div class="logo-icon">
        <span class="material-symbols-rounded">visibility</span>
      </div>
      <h1 class="brand-title">Vision Care</h1>
      <p class="brand-subtitle">Clinical Portal</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded">mail</span>
          <input type="email" id="email" formControlName="email" placeholder="doctor@visioncare.com">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded">lock</span>
          <input type="password" id="password" formControlName="password" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>
    
    <div class="login-footer">
      <p>Secure login for medical staff only.</p>
    </div>
  </div>
</div>
